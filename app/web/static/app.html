<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Привязка чатов к проектам</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #fff);
      --text: var(--tg-theme-text-color, #000);
      --hint: var(--tg-theme-hint-color, #888);
      --card: var(--tg-theme-secondary-bg-color, #f1f1f4);
      --accent: var(--tg-theme-button-color, #2ea6ff);
      --accent-text: var(--tg-theme-button-text-color, #fff);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 12px 12px 32px;
      font: 15px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text);
    }
    h1 { font-size: 17px; margin: 4px 0 2px; }
    .sub { color: var(--hint); font-size: 13px; margin-bottom: 14px; }
    .group-label { color: var(--hint); font-size: 12px; text-transform: uppercase;
      letter-spacing: .04em; margin: 18px 4px 6px; }
    .row {
      background: var(--card); border-radius: 12px; padding: 10px 12px; margin-bottom: 8px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .row .name { font-weight: 600; word-break: break-word; }
    .row .id { color: var(--hint); font-size: 11px; }
    select {
      width: 100%; padding: 9px 10px; border-radius: 9px; border: 1px solid transparent;
      background: var(--bg); color: var(--text); font-size: 15px; appearance: none;
    }
    .saved { color: var(--accent); font-size: 12px; min-height: 14px; }
    .empty, .err { text-align: center; color: var(--hint); margin-top: 40px; }
    .err { color: #e05a5a; }
    #toast {
      position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%);
      background: var(--accent); color: var(--accent-text); padding: 8px 16px;
      border-radius: 20px; font-size: 14px; opacity: 0; transition: opacity .2s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>
  <h1>Чаты → проекты TickTick</h1>
  <div class="sub">Выбери проект для каждого чата. Задачи из чата будут попадать в него.</div>
  <div id="content"><div class="empty">Загрузка…</div></div>
  <div id="toast"></div>

  <script>
    const tg = window.Telegram?.WebApp;
    tg?.ready();
    tg?.expand();

    const INIT = tg?.initData || "";
    const $content = document.getElementById("content");
    const $toast = document.getElementById("toast");
    let toastTimer;

    function toast(msg) {
      $toast.textContent = msg;
      $toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => $toast.classList.remove("show"), 1500);
    }

    async function api(path, body) {
      const res = await fetch(path, {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-Telegram-Init-Data": INIT },
        body: JSON.stringify(body || {}),
      });
      if (!res.ok) throw new Error((await res.text()) || res.status);
      return res.json();
    }

    function optionList(projects, selectedId) {
      const none = `<option value="">— не привязано —</option>`;
      const opts = projects.map(p =>
        `<option value="${p.id}" ${p.id === selectedId ? "selected" : ""}>${esc(p.name)}</option>`
      ).join("");
      return none + opts;
    }

    function esc(s) {
      return String(s).replace(/[&<>"']/g, c =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    function render(data) {
      const { projects, chats } = data;
      if (!chats.length) {
        $content.innerHTML = `<div class="empty">Бот пока не видел ни одного чата.<br>
          Добавь его в группу или напиши в личке, потом обнови.</div>`;
        return;
      }
      const groups = chats.filter(c => c.kind === "group");
      const dms = chats.filter(c => c.kind === "dm");
      $content.innerHTML = "";
      if (groups.length) section("Группы", groups, projects);
      if (dms.length) section("Личные чаты", dms, projects);
    }

    function section(label, list, projects) {
      const lbl = document.createElement("div");
      lbl.className = "group-label";
      lbl.textContent = label;
      $content.appendChild(lbl);

      for (const c of list) {
        const row = document.createElement("div");
        row.className = "row";
        row.innerHTML = `
          <div>
            <div class="name">${esc(c.title)}</div>
            <div class="id">${esc(c.chatId)}</div>
          </div>
          <select>${optionList(projects, c.boundProjectId)}</select>
          <div class="saved"></div>`;
        const sel = row.querySelector("select");
        const saved = row.querySelector(".saved");
        sel.addEventListener("change", async () => {
          const pid = sel.value;
          saved.textContent = "Сохраняю…";
          try {
            if (pid) {
              const r = await api("/api/bind", { chatId: c.chatId, projectId: pid });
              saved.textContent = "✓ " + r.projectName;
            } else {
              await api("/api/unbind", { chatId: c.chatId });
              saved.textContent = "Отвязано";
            }
            tg?.HapticFeedback?.notificationOccurred("success");
            toast("Сохранено");
          } catch (e) {
            saved.textContent = "Ошибка: " + e.message;
            tg?.HapticFeedback?.notificationOccurred("error");
          }
        });
        $content.appendChild(row);
      }
    }

    (async () => {
      try {
        const data = await api("/api/data");
        render(data);
      } catch (e) {
        $content.innerHTML = `<div class="err">Не удалось загрузить.<br>${esc(e.message)}</div>`;
      }
    })();
  </script>
</body>
</html>
