<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Большой брат</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #18191c);
      --text: var(--tg-theme-text-color, #e8e8ea);
      --hint: var(--tg-theme-hint-color, #8a8f98);
      --card: var(--tg-theme-secondary-bg-color, #232428);
      --accent: var(--tg-theme-button-color, #2ea6ff);
      --accent-text: var(--tg-theme-button-text-color, #fff);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      padding: 12px 12px 40px;
      font: 15px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text);
    }

    /* Search */
    .search-wrap { position: relative; margin-bottom: 12px; }
    .search-wrap::before {
      content: "🔍"; position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      font-size: 15px; pointer-events: none;
    }
    #searchInput {
      width: 100%; padding: 10px 12px 10px 36px; border-radius: 12px; border: none;
      background: var(--card); color: var(--text); font-size: 15px;
    }
    #searchInput:focus { outline: 2px solid var(--accent); }
    #searchInput::placeholder { color: var(--hint); }

    #addBtn {
      display: none; width: 100%; margin-bottom: 12px; padding: 12px;
      border: none; border-radius: 11px; background: var(--accent); color: var(--accent-text);
      font-size: 15px; font-weight: 600; cursor: pointer;
    }

    /* Chat cards */
    .chat-card { background: var(--card); border-radius: 14px; margin-bottom: 8px; overflow: hidden; }
    .chat-header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px; cursor: pointer; user-select: none;
    }
    .chat-emoji { font-size: 20px; flex-shrink: 0; }
    .chat-info { flex: 1; min-width: 0; }
    .chat-name-row { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
    .chat-name { font-weight: 600; font-size: 15px; }
    .chat-alias-badge { color: var(--hint); font-size: 13px; }
    .chat-meta { color: var(--hint); font-size: 12px; margin-top: 2px; }
    .chat-chevron { color: var(--hint); font-size: 12px; flex-shrink: 0; transition: transform .2s; }
    .chat-chevron.open { transform: rotate(180deg); }

    .chat-body { display: none; padding: 0 14px 14px; }
    .chat-body.open { display: block; }

    /* Blocks inside card */
    .block { margin-top: 10px; border-radius: 10px; overflow: hidden; }
    .block-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 12px; background: var(--bg); cursor: pointer; user-select: none;
      font-size: 13px; font-weight: 600; color: var(--hint);
    }
    .block-header .bchev { transition: transform .2s; }
    .block-header.open .bchev { transform: rotate(180deg); }
    .block-body { padding: 10px 12px 12px; background: var(--bg); }
    .block-body.collapsed { display: none; }

    select {
      width: 100%; padding: 9px 10px; border-radius: 9px; border: 1px solid transparent;
      background: var(--card); color: var(--text); font-size: 15px; appearance: none; cursor: pointer;
    }
    select:focus { outline: 2px solid var(--accent); }
    .select-wrap { position: relative; margin-bottom: 8px; }
    .select-wrap::after {
      content: "▾"; position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      color: var(--hint); pointer-events: none;
    }
    .saved-label { color: var(--accent); font-size: 12px; min-height: 16px; margin-top: 2px; }

    .alias-input {
      width: 100%; padding: 9px 12px; border-radius: 10px;
      border: 1px solid transparent; background: var(--card);
      color: var(--text); font-size: 15px; font-family: inherit;
    }
    .alias-input:focus { outline: none; border-color: var(--accent); }
    .field-hint { color: var(--hint); font-size: 12px; margin-top: 4px; }

    .field-label { font-size: 12px; color: var(--hint); margin: 10px 0 3px; }
    .field-label:first-child { margin-top: 0; }
    textarea {
      width: 100%; padding: 8px 10px; border-radius: 9px; border: 1px solid transparent;
      background: var(--card); color: var(--text); font-size: 14px; font-family: inherit;
      resize: none; overflow: hidden; min-height: 38px; line-height: 1.4;
    }
    textarea:focus { outline: none; border-color: var(--accent); }

    .bulk-btn {
      width: 100%; margin-top: 12px; padding: 10px; border: none; border-radius: 10px;
      background: var(--card); color: var(--accent); font-size: 14px; font-weight: 600; cursor: pointer;
    }

    /* Bottom sheet */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      display: none; align-items: flex-end; z-index: 100;
    }
    .overlay.show { display: flex; }
    .sheet {
      background: var(--bg); border-radius: 20px 20px 0 0;
      padding: 16px 14px 32px; width: 100%; max-height: 80vh; overflow-y: auto;
    }
    .sheet-title { font-weight: 700; font-size: 16px; margin-bottom: 10px; }
    .quick-sel { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .quick-btn {
      padding: 6px 12px; border: none; border-radius: 8px;
      background: var(--card); color: var(--text); font-size: 13px; cursor: pointer;
    }
    .check-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 4px; border-bottom: 1px solid var(--card); cursor: pointer;
    }
    .check-box {
      width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--hint);
      flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px;
    }
    .check-box.checked { background: var(--accent); border-color: var(--accent); color: #fff; }
    .sheet-actions { display: flex; gap: 8px; margin-top: 14px; }
    .sheet-apply {
      flex: 1; padding: 12px; border: none; border-radius: 11px;
      background: var(--accent); color: var(--accent-text); font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .sheet-close {
      padding: 12px 18px; border: none; border-radius: 11px;
      background: var(--card); color: var(--text); font-size: 15px; cursor: pointer;
    }

    #toast {
      position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%);
      background: var(--accent); color: var(--accent-text); padding: 8px 18px;
      border-radius: 20px; font-size: 14px; opacity: 0; transition: opacity .2s;
      pointer-events: none; white-space: nowrap; z-index: 200;
    }
    #toast.show { opacity: 1; }

    .empty { text-align: center; color: var(--hint); margin-top: 40px; }
    .err { text-align: center; color: #e05a5a; margin-top: 40px; }
    .section-divider {
      color: var(--hint); font-size: 11px; text-transform: uppercase;
      letter-spacing: .05em; margin: 16px 4px 6px;
    }
  </style>
</head>
<body>

<div class="search-wrap">
  <input id="searchInput" type="search" placeholder="Поиск по имени или алиасу…" autocomplete="off" />
</div>
<button id="addBtn">➕ Добавить бота в группу</button>
<div id="content"><div class="empty">Загрузка…</div></div>
<div id="toast"></div>

<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-title" id="sheetTitle">Применить настройки к:</div>
    <div class="quick-sel">
      <button class="quick-btn" onclick="selectQuick('all')">Все</button>
      <button class="quick-btn" onclick="selectQuick('dm')">Все лички</button>
      <button class="quick-btn" onclick="selectQuick('group')">Все группы</button>
      <button class="quick-btn" onclick="selectQuick('none')">Очистить</button>
    </div>
    <div id="sheetList"></div>
    <div class="sheet-actions">
      <button class="sheet-apply" id="sheetApply">📤 Применить (0)</button>
      <button class="sheet-close" onclick="closeSheet()">✕</button>
    </div>
  </div>
</div>

<div class="overlay" id="promptOverlay">
  <div class="sheet">
    <div class="sheet-title">Встроенный базовый промпт</div>
    <pre id="promptText" style="white-space:pre-wrap;word-break:break-word;font-size:13px;line-height:1.5;max-height:60vh;overflow-y:auto;background:var(--card);padding:12px;border-radius:10px;margin:0"></pre>
    <div class="sheet-actions">
      <button class="sheet-apply" onclick="closePromptView()">Закрыть</button>
    </div>
  </div>
</div>

<script>
  const tg = window.Telegram?.WebApp;
  tg?.ready(); tg?.expand();
  const INIT = tg?.initData || "";

  let allChats = [];
  let allProjects = [];
  let bulkSourceId = null;
  let bulkSelected = new Set();

  function esc(s) {
    return String(s).replace(/[&<>"']/g,
      c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  let toastTimer;
  function toast(msg) {
    const el = document.getElementById("toast");
    el.textContent = msg; el.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove("show"), 1600);
  }

  function timeAgo(iso) {
    if (!iso) return "";
    const diff = Date.now() - new Date(iso).getTime();
    const m = Math.floor(diff / 60000);
    if (m < 2) return "только что";
    if (m < 60) return m + "м назад";
    const h = Math.floor(m / 60);
    if (h < 24) return h + "ч назад";
    const d = Math.floor(h / 24);
    if (d === 1) return "вчера";
    return d + "д назад";
  }

  async function api(path, body) {
    const isGet = body === undefined;
    const res = await fetch(path, {
      method: isGet ? "GET" : "POST",
      headers: {"Content-Type":"application/json","X-Telegram-Init-Data":INIT},
      ...(isGet ? {} : {body: JSON.stringify(body)}),
    });
    if (!res.ok) throw new Error((await res.text()) || res.status);
    return res.json();
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = el.scrollHeight + "px";
  }

  // ── render ────────────────────────────────────────────────────────────────

  function render(data) {
    allProjects = data.projects || [];
    // Sort by message count desc, fallback to lastMessageAt
    allChats = (data.chats || []).sort((a, b) =>
      (b.activityScore || 0) - (a.activityScore || 0)
    );

    const $c = document.getElementById("content");
    if (!allChats.length) {
      $c.innerHTML = `<div class="empty">Бот ещё не видел ни одного чата.<br>Напиши ему в личку или добавь в группу.</div>`;
      return;
    }

    $c.innerHTML = "";
    $c.appendChild(buildGlobalCard());

    const groups = allChats.filter(c => c.kind === "group");
    const dms    = allChats.filter(c => c.kind === "dm");

    if (groups.length) {
      const lbl = document.createElement("div");
      lbl.className = "section-divider"; lbl.textContent = "Группы";
      $c.appendChild(lbl);
      groups.forEach(c => $c.appendChild(buildChatCard(c)));
    }
    if (dms.length) {
      const lbl = document.createElement("div");
      lbl.className = "section-divider"; lbl.textContent = "Личные чаты";
      $c.appendChild(lbl);
      dms.forEach(c => $c.appendChild(buildChatCard(c)));
    }

    document.getElementById("searchInput").addEventListener("input", filterCards);
  }

  // ── Global card ───────────────────────────────────────────────────────────

  function buildGlobalCard() {
    const card = document.createElement("div");
    card.className = "chat-card";
    card.dataset.name = "глобальные global";
    card.dataset.alias = "";
    card.innerHTML = `
      <div class="chat-header" onclick="toggleCard(this)">
        <span class="chat-emoji">🌐</span>
        <div class="chat-info">
          <div class="chat-name-row"><span class="chat-name">Глобальные настройки</span></div>
          <div class="chat-meta">Применяются ко всем чатам как база</div>
        </div>
        <span class="chat-chevron">▾</span>
      </div>
      <div class="chat-body">
        ${buildModelBlock("__global__", true)}
        ${buildControlBlock("__global__", true)}
        ${buildSummaryBlock("__global__", true)}
        ${buildPromptsBlock("__global__")}
        ${buildPromptOverrideBlock("__global__", true)}
        ${buildQwenBlock()}
      </div>`;
    return card;
  }

  // ── Chat card ─────────────────────────────────────────────────────────────

  function buildChatCard(c) {
    const card = document.createElement("div");
    card.className = "chat-card";
    card.dataset.chatId = c.chatId;
    card.dataset.name = (c.title || "").toLowerCase();
    card.dataset.alias = (c.alias || "").toLowerCase();

    const emoji = c.kind === "group" ? "👥" : "👤";
    const aliasHtml = c.alias ? `<span class="chat-alias-badge">· ${esc(c.alias)}</span>` : "";
    const ago = timeAgo(c.lastMessageAt);

    card.innerHTML = `
      <div class="chat-header" onclick="toggleCard(this)">
        <span class="chat-emoji">${emoji}</span>
        <div class="chat-info">
          <div class="chat-name-row">
            <span class="chat-name">${esc(c.title || c.chatId)}</span>
            ${aliasHtml}
          </div>
          <div class="chat-meta">${esc(c.chatId)}${ago ? " · " + ago : ""}</div>
        </div>
        <span class="chat-chevron">▾</span>
      </div>
      <div class="chat-body">
        ${buildProjectBlock(c)}
        ${buildSectionRoutingBlock(c)}
        ${buildModelBlock(c.chatId, false)}
        ${buildControlBlock(c.chatId, false)}
        ${c.kind === "group" ? buildSummaryBlock(c.chatId, false) : ""}
        ${buildAliasBlock(c)}
        ${buildPromptsBlock(c.chatId)}
        ${buildPromptOverrideBlock(c.chatId, false)}
      </div>`;

    setTimeout(() => { wireProjectSelects(card, c); wireSectionRouting(card, c); }, 0);
    return card;
  }

  function toggleCard(header) {
    const body = header.nextElementSibling;
    const chev = header.querySelector(".chat-chevron");
    const isOpen = body.classList.toggle("open");
    chev.classList.toggle("open", isOpen);
    if (isOpen) {
      const chatId = header.closest(".chat-card").dataset.chatId || "__global__";
      loadSettings(chatId, header.closest(".chat-card"));
      header.closest(".chat-card").querySelectorAll("textarea").forEach(autoResize);
    }
  }

  function toggleBlock(header) {
    const body = header.nextElementSibling;
    const collapsed = body.classList.toggle("collapsed");
    header.classList.toggle("open", !collapsed);
  }

  // ── Project block ─────────────────────────────────────────────────────────

  function buildProjectBlock(c) {
    const opts = [`<option value="">— не привязано —</option>`]
      .concat(allProjects.map(p =>
        `<option value="${esc(p.id)}" ${p.id === c.boundProjectId ? "selected":""}>${esc(p.name)}</option>`
      )).join("");
    return `
      <div class="block">
        <div class="block-header open" onclick="toggleBlock(this)">📦 Проект и раздел <span class="bchev">▾</span></div>
        <div class="block-body">
          <div class="select-wrap"><select class="proj-sel">${opts}</select></div>
          <div class="select-wrap sect-wrap" style="display:none"><select class="sect-sel"></select></div>
          <div class="saved-label"></div>
        </div>
      </div>`;
  }

  function wireProjectSelects(card, c) {
    const selP = card.querySelector(".proj-sel");
    const selS = card.querySelector(".sect-sel");
    const sectWrap = card.querySelector(".sect-wrap");
    const saved = card.querySelector(".saved-label");
    if (!selP) return;

    async function loadSections(pid, selectedId) {
      sectWrap.style.display = "block";
      selS.innerHTML = `<option>— загрузка… —</option>`;
      try {
        const r = await api("/api/sections", {projectId: pid});
        const secs = r.sections || [];
        if (!secs.length) { sectWrap.style.display = "none"; return; }
        selS.innerHTML = `<option value="">— без раздела —</option>` +
          secs.map(s => `<option value="${esc(s.id)}" ${s.id===selectedId?"selected":""}>${esc(s.name)}</option>`).join("");
      } catch { sectWrap.style.display = "none"; }
    }

    if (c.boundProjectId) loadSections(c.boundProjectId, c.boundSectionId);

    selP.addEventListener("change", async () => {
      const pid = selP.value;
      saved.textContent = "Сохраняю…";
      try {
        if (pid) {
          const r = await api("/api/bind", {chatId: c.chatId, projectId: pid});
          saved.textContent = "✓ " + r.projectName;
          await loadSections(pid, null);
        } else {
          await api("/api/unbind", {chatId: c.chatId});
          saved.textContent = "Отвязано";
          sectWrap.style.display = "none";
        }
        tg?.HapticFeedback?.notificationOccurred("success");
        toast("Сохранено");
      } catch (e) { saved.textContent = "Ошибка: " + e.message; }
    });

    selS.addEventListener("change", async () => {
      if (!selP.value) return;
      saved.textContent = "Сохраняю…";
      try {
        const r = await api("/api/bind", {chatId: c.chatId, projectId: selP.value, sectionId: selS.value});
        saved.textContent = "✓ " + r.projectName + (r.sectionName ? " / " + r.sectionName : "");
        tg?.HapticFeedback?.notificationOccurred("success");
        toast("Сохранено");
      } catch (e) { saved.textContent = "Ошибка: " + e.message; }
    });
  }

  // ── Section routing block (optional per-category → column) ─────────────────

  const SR_CATS = [
    {cat:"open",      label:"✅ Реальные задачи (летят всегда)"},
    {cat:"done",      label:"☑️ Выполнено"},
    {cat:"cancelled", label:"🚫 Отменено"},
    {cat:"rejected",  label:"🗑 Брак / мусор"},
  ];

  function buildSectionRoutingBlock(c) {
    const rows = SR_CATS.map(x => `
      <div class="field-label">${x.label}</div>
      <div class="select-wrap"><select class="sr-sel" data-cat="${x.cat}"></select></div>
    `).join("");
    return `
      <div class="block">
        <div class="block-header" onclick="toggleBlock(this)">🗂 Разнести по разделам <span class="bchev">▾</span></div>
        <div class="block-body collapsed">
          <label style="display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:14px">
            <input type="checkbox" class="sr-enabled"> Включить разнесение по разделам
          </label>
          <div class="sr-fields" style="display:none">
            ${rows}
            <div style="font-size:12px;color:var(--muted);margin-top:6px;line-height:1.5">
              Не выбрал раздел — эта категория никуда не летит (кроме реальных задач:
              они летят всегда, в дефолтный раздел).
            </div>
          </div>
          <div class="sr-noproj" style="display:none;font-size:13px;color:var(--muted)">
            Сначала привяжи проект в блоке выше.
          </div>
        </div>
      </div>`;
  }

  async function wireSectionRouting(card, c) {
    const chatId = c.chatId || "__global__";
    const enabledCb = card.querySelector(".sr-enabled");
    const fields = card.querySelector(".sr-fields");
    const noproj = card.querySelector(".sr-noproj");
    if (!enabledCb) return;
    const selects = [...card.querySelectorAll(".sr-sel")];
    const pid = c.boundProjectId;

    let smap = {};
    try {
      const doc = await api(`/api/settings?chatId=${encodeURIComponent(chatId)}`);
      smap = doc.section_map || {};
    } catch {}

    async function populate() {
      if (!pid) { fields.style.display = "none"; noproj.style.display = "block"; return; }
      noproj.style.display = "none"; fields.style.display = "block";
      let secs = [];
      try { secs = (await api("/api/sections", {projectId: pid})).sections || []; } catch {}
      selects.forEach(sel => {
        const cur = (smap[sel.dataset.cat] || {}).id || "";
        sel.innerHTML = `<option value="">— не выбрано —</option>` +
          secs.map(s => `<option value="${esc(s.id)}" data-name="${esc(s.name)}" ${s.id===cur?"selected":""}>${esc(s.name)}</option>`).join("");
      });
    }

    function currentMap() {
      const m = { enabled: enabledCb.checked };
      selects.forEach(sel => {
        const opt = sel.selectedOptions[0];
        m[sel.dataset.cat] = sel.value ? { id: sel.value, name: opt?.dataset.name || "" } : null;
      });
      return m;
    }

    async function save() {
      try { await api("/api/settings", { chatId, section_map: currentMap() }); toast("Сохранено"); }
      catch { toast("Ошибка сохранения"); }
    }

    enabledCb.checked = !!smap.enabled;
    if (enabledCb.checked) await populate();
    else { fields.style.display = "none"; noproj.style.display = "none"; }

    enabledCb.addEventListener("change", async () => {
      if (enabledCb.checked) await populate();
      else { fields.style.display = "none"; noproj.style.display = "none"; }
      await save();
    });
    selects.forEach(sel => sel.addEventListener("change", save));
  }

  // ── Model + effort block ──────────────────────────────────────────────────

  function buildModelBlock(chatId, isGlobal) {
    const inheritLabel = isGlobal ? "По умолчанию (деплой)" : "— как в глобальных —";
    const inheritOpt = `<option value="">${inheritLabel}</option>`;
    return `
      <div class="block">
        <div class="block-header" onclick="toggleBlock(this)">🧠 Модель и усилие <span class="bchev">▾</span></div>
        <div class="block-body collapsed">
          <div class="field-label">Модель извлечения</div>
          <div class="select-wrap">
            <select class="model-sel" data-chat-id="${esc(chatId)}">
              ${inheritOpt}
              <option value="opus">Opus (умнее, дороже)</option>
              <option value="sonnet">Sonnet (баланс)</option>
              <option value="haiku">Haiku (быстро, дёшево)</option>
            </select>
          </div>
          <div class="field-label">Усилие (только на API-пути)</div>
          <div class="select-wrap">
            <select class="effort-sel" data-chat-id="${esc(chatId)}">
              ${inheritOpt}
              <option value="low">Низкое</option>
              <option value="medium">Среднее</option>
              <option value="high">Высокое</option>
              <option value="max">Максимум</option>
            </select>
          </div>
          <div class="field-hint">Пусто — берётся из глобальных (или из настроек деплоя). Усилие применяется только на прямом API Claude; на шиме (подписка) — нет.</div>
        </div>
      </div>`;
  }

  // ── Editable base prompt override block ────────────────────────────────────

  function buildPromptOverrideBlock(chatId, isGlobal) {
    const hint = isGlobal
      ? "Пусто — используется встроенный базовый промпт."
      : "Пусто — берётся из глобальных (или встроенный по умолчанию).";
    return `
      <div class="block">
        <div class="block-header" onclick="toggleBlock(this)">📝 Базовый промпт извлечения <span class="bchev">▾</span></div>
        <div class="block-body collapsed">
          <textarea class="prompt-override" placeholder="Свой базовый промпт (перезаписывает встроенный)…"
            data-field="system_prompt" data-chat-id="${esc(chatId)}" rows="1"></textarea>
          <div style="display:flex;gap:8px;margin-top:8px">
            <button class="bulk-btn" style="margin-top:0" onclick="viewDefaultPrompt(event)">👁 Посмотреть дефолтный</button>
            <button class="bulk-btn" style="margin-top:0" onclick="resetPrompt(this,event)">↩︎ Вернуть дефолт</button>
          </div>
          <div class="field-hint">${hint} Контракт формата (JSON-схема) добавляется бэкендом всегда — сломать вывод нельзя.</div>
        </div>
      </div>`;
  }

  // ── Qwen (tier-1) endpoint block — global only ─────────────────────────────

  function buildQwenBlock() {
    return `
      <div class="block">
        <div class="block-header" onclick="toggleBlock(this)">🔎 Первичный фильтр (Qwen) <span class="bchev">▾</span></div>
        <div class="block-body collapsed">
          <div class="field-label">Endpoint локальной модели (OpenAI-совместимый)</div>
          <input class="qwen-input" type="text" placeholder="напр.: http://localhost:11434/v1" data-chat-id="__global__" />
          <div class="field-hint">Пусто — тир-1 выключен, всё идёт сразу в Claude. Укажи адрес своей локальной модели, чтобы включить дешёвый предфильтр.</div>
        </div>
      </div>`;
  }

  async function viewDefaultPrompt(e) {
    e.stopPropagation();
    const box = document.getElementById("promptText");
    box.textContent = "Загрузка…";
    document.getElementById("promptOverlay").classList.add("show");
    try {
      const r = await api("/api/default-prompt");
      box.textContent = r.prompt || "(пусто)";
    } catch (err) { box.textContent = "Ошибка: " + err.message; }
  }

  function closePromptView() { document.getElementById("promptOverlay").classList.remove("show"); }

  function resetPrompt(btn, e) {
    e.stopPropagation();
    const ta = btn.closest(".block-body").querySelector(".prompt-override");
    if (!ta) return;
    ta.value = "";
    autoResize(ta);
    saveField(ta.dataset.chatId, "system_prompt", "");
    toast("Вернул дефолт");
  }

  // ── Control («Контроль») block — DM attribution toggle ────────────────────

  function buildControlBlock(chatId, isGlobal) {
    const inherit = isGlobal ? "" : `<option value="">— как в глобальных —</option>`;
    return `
      <div class="block">
        <div class="block-header" onclick="toggleBlock(this)">👁 Контроль (личка) <span class="bchev">▾</span></div>
        <div class="block-body collapsed">
          <div class="field-label">Действие на собеседнике (делегировал или сам вызвался)</div>
          <div class="select-wrap">
            <select class="control-sel" data-chat-id="${esc(chatId)}">
              ${inherit}
              <option value="on">Отмечать как «Контроль» (по умолчанию)</option>
              <option value="off">Не создавать — только мои задачи</option>
            </select>
          </div>
          <div class="field-hint">Только личка. Задачи на меня остаются моими. Группы не затрагиваются.</div>
          <div class="field-label">Метка в заголовке TickTick</div>
          <input class="control-marker" type="text" placeholder="👁" data-chat-id="${esc(chatId)}" />
          <div class="field-label">Тег в TickTick</div>
          <input class="control-tag" type="text" placeholder="контроль" data-chat-id="${esc(chatId)}" />
          <div class="field-hint">Пусто — берётся значение из глобальных (или дефолт). Метку можно очистить в глобальных, если префикс не нужен.</div>
        </div>
      </div>`;
  }

  // ── Daily summary block — end-of-day recap posted INTO the group ──────────

  function buildSummaryBlock(chatId, isGlobal) {
    const inherit = isGlobal ? "" : `<option value="">— как в глобальных —</option>`;
    return `
      <div class="block">
        <div class="block-header" onclick="toggleBlock(this)">📋 Итог дня (группа) <span class="bchev">▾</span></div>
        <div class="block-body collapsed">
          <div class="field-label">Публиковать в группе итог дня (создано / обновлено)</div>
          <div class="select-wrap">
            <select class="summary-sel" data-chat-id="${esc(chatId)}">
              ${inherit}
              <option value="off">Выключено (по умолчанию)</option>
              <option value="on">Включено — постить в группу вечером</option>
            </select>
          </div>
          <div class="field-hint">Только группы. Сообщение видят участники группы — в нём только заголовки задач. Пустые дни пропускаются.</div>
        </div>
      </div>`;
  }

  // ── Alias block ───────────────────────────────────────────────────────────

  function buildAliasBlock(c) {
    return `
      <div class="block">
        <div class="block-header open" onclick="toggleBlock(this)">🏷 Алиас <span class="bchev">▾</span></div>
        <div class="block-body">
          <input class="alias-input" type="text" placeholder="Напр.: Алина, Влад, Мама…"
            data-chat-id="${esc(c.chatId)}" value="${esc(c.alias || "")}" />
          <div class="field-hint">Автосохранение при потере фокуса · Используется в поиске · Отображается в TickTick</div>
        </div>
      </div>`;
  }

  // ── Prompts block ─────────────────────────────────────────────────────────

  const FIELDS = [
    {key:"who",          label:"👤 Кто этот человек / о чём чат",     ph:"Напр.: деловой партнёр, вместе ведём автопарк в Лос-Анджелесе"},
    {key:"topics",       label:"💬 Что обычно обсуждаете",            ph:"Напр.: закупки, платежи, вэны, ремонт, планы поездок"},
    {key:"task_side",    label:"🎯 Кому ставятся задачи",             ph:"Напр.: задачи в основном мне, он больше информирует и напоминает"},
    {key:"importance",   label:"⭐ Когда задача важная, а когда нет", ph:"Напр.: важны только задачи с деньгами или дедлайном; бытовые «надо бы» — не важны"},
    {key:"people",       label:"👥 Кто ещё участвует (имена, роли)",  ph:"Напр.: Коля — прораб, Артём — водитель, Оскар — финансы"},
    {key:"filter_rules", label:"🔍 Как понять, задача это или нет",   ph:"Напр.: любые упоминания денег и дат — задача, даже если сказано вскользь"},
    {key:"extract_rules",label:"✍️ Как вытаскивать задачи",          ph:"Напр.: всегда фиксируй сумму; дедлайн считай жёстким, даже если «наверное»"},
  ];

  function buildPromptsBlock(chatId) {
    const fields = FIELDS.map(f => `
      <div class="field-label">${f.label}</div>
      <textarea placeholder="${esc(f.ph)}" data-field="${f.key}" data-chat-id="${esc(chatId)}" rows="1"></textarea>
    `).join("");
    return `
      <div class="block">
        <div class="block-header" onclick="toggleBlock(this)">⚙️ Настройки промптов <span class="bchev">▾</span></div>
        <div class="block-body collapsed">
          ${fields}
          <button class="bulk-btn" onclick="openBulk('${esc(chatId)}',event)">📤 Применить к нескольким чатам</button>
        </div>
      </div>`;
  }

  // ── Load & save settings ──────────────────────────────────────────────────

  async function loadSettings(chatId, card) {
    if (card.dataset.settingsLoaded) return;
    card.dataset.settingsLoaded = "1";
    try {
      const doc = await api(`/api/settings?chatId=${encodeURIComponent(chatId)}`);
      card.querySelectorAll("textarea[data-field]").forEach(ta => {
        ta.value = doc[ta.dataset.field] || "";
        autoResize(ta);
      });
      const aliasInput = card.querySelector(".alias-input");
      if (aliasInput && doc.alias) aliasInput.value = doc.alias;
      const controlSel = card.querySelector(".control-sel");
      if (controlSel) {
        // Global card has no "inherit" option → default the display to "on".
        const hasInherit = !!controlSel.querySelector('option[value=""]');
        controlSel.value = doc.control_mode || (hasInherit ? "" : "on");
        controlSel.addEventListener("change", async () => {
          await saveField(controlSel.dataset.chatId, "control_mode", controlSel.value);
          toast("Сохранено");
        });
      }
      const summarySel = card.querySelector(".summary-sel");
      if (summarySel) {
        // Global card has no "inherit" option → default the display to "off".
        const hasInherit = !!summarySel.querySelector('option[value=""]');
        summarySel.value = doc.daily_summary || (hasInherit ? "" : "off");
        summarySel.addEventListener("change", async () => {
          await saveField(summarySel.dataset.chatId, "daily_summary", summarySel.value);
          toast("Сохранено");
        });
      }
      const markerInput = card.querySelector(".control-marker");
      if (markerInput) {
        markerInput.value = doc.control_marker || "";
        markerInput.addEventListener("blur", () =>
          saveField(markerInput.dataset.chatId, "control_marker", markerInput.value.trim()));
      }
      const tagInput = card.querySelector(".control-tag");
      if (tagInput) {
        tagInput.value = doc.control_tag || "";
        tagInput.addEventListener("blur", () =>
          saveField(tagInput.dataset.chatId, "control_tag", tagInput.value.trim()));
      }
      const modelSel = card.querySelector(".model-sel");
      if (modelSel) {
        modelSel.value = doc.extract_model || "";
        modelSel.addEventListener("change", async () => {
          await saveField(modelSel.dataset.chatId, "extract_model", modelSel.value);
          toast("Сохранено");
        });
      }
      const effortSel = card.querySelector(".effort-sel");
      if (effortSel) {
        effortSel.value = doc.extract_effort || "";
        effortSel.addEventListener("change", async () => {
          await saveField(effortSel.dataset.chatId, "extract_effort", effortSel.value);
          toast("Сохранено");
        });
      }
      const qwenInput = card.querySelector(".qwen-input");
      if (qwenInput) {
        qwenInput.value = doc.qwen_base_url || "";
        qwenInput.addEventListener("blur", () =>
          saveField(qwenInput.dataset.chatId, "qwen_base_url", qwenInput.value.trim()));
      }
    } catch (e) { console.warn("loadSettings failed", chatId, e); }

    card.querySelectorAll("textarea[data-field]").forEach(ta => {
      ta.addEventListener("input", () => autoResize(ta));
      ta.addEventListener("blur", () => saveField(ta.dataset.chatId, ta.dataset.field, ta.value));
    });

    const aliasInput = card.querySelector(".alias-input");
    if (aliasInput) {
      aliasInput.addEventListener("blur", async () => {
        const cid = aliasInput.dataset.chatId;
        const val = aliasInput.value.trim();
        await saveField(cid, "alias", val);
        updateAliasBadge(card, val);
        card.dataset.alias = val.toLowerCase();
        toast(val ? `Алиас: ${val}` : "Алиас удалён");
      });
    }
  }

  async function saveField(chatId, field, value) {
    try {
      await api("/api/settings", {chatId, [field]: value});
    } catch (e) { toast("Ошибка сохранения"); }
  }

  function updateAliasBadge(card, alias) {
    let badge = card.querySelector(".chat-alias-badge");
    if (alias) {
      if (!badge) {
        badge = document.createElement("span");
        badge.className = "chat-alias-badge";
        card.querySelector(".chat-name-row").appendChild(badge);
      }
      badge.textContent = "· " + alias;
    } else if (badge) { badge.remove(); }
  }

  // ── Search ────────────────────────────────────────────────────────────────

  function filterCards() {
    const q = document.getElementById("searchInput").value.trim().toLowerCase();
    document.querySelectorAll(".chat-card").forEach(card => {
      if (!card.dataset.chatId) { card.style.display = ""; return; }
      const ok = !q || card.dataset.name.includes(q) || card.dataset.alias.includes(q);
      card.style.display = ok ? "" : "none";
    });
    document.querySelectorAll(".section-divider").forEach(div => {
      let next = div.nextElementSibling, has = false;
      while (next && !next.classList.contains("section-divider")) {
        if (next.style.display !== "none") has = true;
        next = next.nextElementSibling;
      }
      div.style.display = has ? "" : "none";
    });
  }

  // ── Bulk apply ────────────────────────────────────────────────────────────

  function openBulk(sourceId, e) {
    e.stopPropagation();
    bulkSourceId = sourceId;
    bulkSelected = new Set();
    const src = allChats.find(c => c.chatId === sourceId);
    const name = src ? (src.alias || src.title || sourceId) : (sourceId === "__global__" ? "Глобальные" : sourceId);
    document.getElementById("sheetTitle").textContent = `Применить настройки из «${name}» к:`;
    document.getElementById("sheetList").innerHTML = allChats.filter(c => c.chatId !== sourceId).map(c => {
      const emoji = c.kind === "group" ? "👥" : "👤";
      const label = c.alias ? `${esc(c.alias)} (${esc(c.title)})` : esc(c.title || c.chatId);
      return `<div class="check-row" onclick="toggleBulk('${esc(c.chatId)}',this)">
        <div class="check-box" id="chk_${esc(c.chatId)}"></div>
        <span>${emoji} ${label}</span>
      </div>`;
    }).join("");
    updateApplyBtn();
    document.getElementById("overlay").classList.add("show");
  }

  function closeSheet() { document.getElementById("overlay").classList.remove("show"); }

  function toggleBulk(chatId, row) {
    if (bulkSelected.has(chatId)) bulkSelected.delete(chatId);
    else bulkSelected.add(chatId);
    const box = document.getElementById("chk_" + chatId);
    if (box) { box.classList.toggle("checked", bulkSelected.has(chatId)); box.textContent = bulkSelected.has(chatId) ? "✓" : ""; }
    updateApplyBtn();
  }

  function selectQuick(type) {
    bulkSelected = new Set();
    allChats.filter(c => c.chatId !== bulkSourceId).forEach(c => {
      if (type === "all" || (type === "dm" && c.kind === "dm") || (type === "group" && c.kind === "group"))
        bulkSelected.add(c.chatId);
    });
    document.querySelectorAll(".check-box").forEach(box => {
      const cid = box.id.replace("chk_", "");
      const on = bulkSelected.has(cid);
      box.classList.toggle("checked", on); box.textContent = on ? "✓" : "";
    });
    updateApplyBtn();
  }

  function updateApplyBtn() {
    document.getElementById("sheetApply").textContent = `📤 Применить (${bulkSelected.size})`;
  }

  document.getElementById("sheetApply").addEventListener("click", async () => {
    if (!bulkSelected.size) return;
    try {
      const r = await api("/api/settings/bulk", {sourceId: bulkSourceId, targetIds: [...bulkSelected]});
      toast(`✅ Применено к ${r.count} чатам`);
      document.querySelectorAll(".chat-card").forEach(card => {
        if (bulkSelected.has(card.dataset.chatId)) delete card.dataset.settingsLoaded;
      });
      closeSheet();
    } catch (e) { toast("Ошибка: " + e.message); }
  });

  function wireAddButton(botUsername) {
    if (!botUsername) return;
    const btn = document.getElementById("addBtn");
    btn.style.display = "block";
    btn.addEventListener("click", () => {
      const link = `https://t.me/${botUsername}?startgroup=true`;
      if (tg?.openTelegramLink) tg.openTelegramLink(link);
      else window.open(link, "_blank");
    });
  }

  (async () => {
    try {
      const data = await api("/api/data");
      wireAddButton(data.botUsername);
      render(data);
    } catch (e) {
      document.getElementById("content").innerHTML =
        `<div class="err">Не удалось загрузить.<br>${esc(e.message)}</div>`;
    }
  })();
</script>
</body>
</html>
